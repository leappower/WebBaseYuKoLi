    <script>
    (function checkDevice(){
      if(window.__redirectChecked)return;
      if(document.querySelector("meta[name=ssg-device]"))return;
      window.__redirectChecked=true;
      var u=new URLSearchParams(location.search);
      var c=u.get("clean-url");
      if(c){history.replaceState({},"",c);return}
      if(window.__spaNavigating)return;
      var f=location.pathname.split("/").pop();
      // 目录 URL（末尾斜杠 /）— 不跳转，让 server.js 处理
      if(!f||!f.match(/.html$/))return;
      if(f.match(/^index-(pc|mobile|tablet).html$/))return;
      function doRedirect(){
        var mq767=window.matchMedia("(max-width:767px)");
        var mq1279=window.matchMedia("(max-width:1279px)");
        var e=mq767.matches?"index-mobile.html":mq1279.matches?"index-tablet.html":"index-pc.html";
        if(f===e)return;
        location.href=location.pathname.replace(/[^\/]*.html$/,"")+e;
      }
      window.addEventListener("DOMContentLoaded",doRedirect);
      setTimeout(doRedirect,100);
    })();
    </script>
