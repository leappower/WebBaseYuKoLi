<!-- ═══ Smart Popup Component Template ═══ -->
<!-- This is a reusable component template for Smart Popup -->
<!-- Use SmartPopupComponent.load() to dynamically load this component -->

<style>
#smart-popup-overlay {
  visibility: hidden;
  opacity: 0;
  pointer-events: none;
  position: fixed;
  inset: 0;
  z-index: var(--z-modal, 1000);
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(4px);
  transition: opacity 0.25s ease, visibility 0.25s ease;
  will-change: opacity;
}

#smart-popup-overlay.show {
  visibility: visible;
  opacity: 1;
  pointer-events: auto;
}

#smart-popup-overlay.closing {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease, visibility 0s 0.2s;
  visibility: hidden;
}

@keyframes popup-enter {
  from { opacity: 0; transform: translateY(16px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes popup-exit {
  from { opacity: 1; transform: translateY(0) scale(1); }
  to   { opacity: 0; transform: translateY(10px) scale(0.97); }
}

#smart-popup-overlay.show .smart-popup-content {
  animation: popup-enter 0.25s cubic-bezier(0.34, 1.2, 0.64, 1) both;
  will-change: transform, opacity;
}

#smart-popup-overlay.closing .smart-popup-content {
  animation: popup-exit 0.2s ease forwards;
}

.smart-popup-content {
  background: #fff;
  border-radius: 1rem;
  padding: 2rem;
  max-width: 480px;
  width: 90%;
  position: relative;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

.smart-popup-close {
  position: absolute;
  top: 0.75rem;
  right: 0.75rem;
  width: 2rem;
  height: 2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f1f5f9;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  color: #64748b;
  transition: background 0.15s ease, color 0.15s ease, transform 0.15s ease;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.smart-popup-close:hover {
  background: #e2e8f0;
  color: #0f172a;
}

.smart-popup-close:active {
  transform: scale(0.9);
}

.smart-popup-info {
  display: none;
  font-size: 0.75rem;
  color: #94a3b8;
  margin-bottom: 0.5rem;
  align-items: center;
  gap: 0.25rem;
}

.smart-popup-header {
  margin-bottom: 1.25rem;
}

.smart-popup-title {
  font-size: 1.25rem;
  font-weight: 700;
  color: #0f172a;
  margin: 0 0 0.25rem;
}

.smart-popup-subtitle {
  font-size: 0.875rem;
  color: #64748b;
  margin: 0;
}

.smart-popup-form {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.smart-popup-form input,
.smart-popup-form textarea {
  border: 1px solid #e2e8f0;
  border-radius: 0.5rem;
  padding: 0.625rem 0.75rem;
  font-size: 0.875rem;
  outline: none;
  transition: border-color 0.2s;
}

.smart-popup-form input:focus,
.smart-popup-form textarea:focus {
  border-color: #3b82f6;
}

.smart-popup-form textarea {
  resize: vertical;
}

.smart-popup-submit {
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 0.5rem;
  padding: 0.75rem;
  font-size: 0.875rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}

.smart-popup-submit:hover {
  background: #2563eb;
}

.smart-popup-submit:active {
  transform: scale(0.98);
}

/* Dark mode support */
@media (prefers-color-scheme: dark) {
  .smart-popup-content {
    background: #1e293b;
  }
  
  .smart-popup-title {
    color: #f1f5f9;
  }
  
  .smart-popup-subtitle {
    color: #94a3b8;
  }
  
  .smart-popup-form input,
  .smart-popup-form textarea {
    background: #0f172a;
    border-color: #334155;
    color: #e2e8f0;
  }
  
  .smart-popup-close {
    color: #94a3b8;
  }
  
  .smart-popup-close:hover {
    color: #f1f5f9;
  }
}

/* Mobile optimizations */
@media (max-width: 640px) {
  .smart-popup-content {
    width: 95%;
    padding: 1.5rem;
    margin: 1rem;
  }
}
</style>

<div id="smart-popup-overlay">
  <div class="smart-popup-content">
    <!-- Close button -->
    <button id="smart-popup-close" class="smart-popup-close" aria-label="Close">&times;</button>
    
    <!-- Info sections (visible in test mode) -->
    <div id="trigger-reason" class="smart-popup-info"></div>
    <div id="popup-today-count" class="smart-popup-info"></div>
    
    <!-- Header -->
    <div class="smart-popup-header">
      <h3 class="smart-popup-title" data-i18n="popup_get_custom_quote">Get a Custom Quote</h3>
      <p class="smart-popup-subtitle" data-i18n="popup_tell_us">Tell us about your kitchen needs — our team will respond within 24 hours.</p>
    </div>
    
    <!-- Form -->
    <form id="smart-popup-form" class="smart-popup-form" action="/api/contact" method="POST">
      <input name="name" type="text" placeholder="Full Name *" data-i18n-placeholder="popup_input_fullname" required />
      <input name="email" type="email" placeholder="Business Email *" data-i18n-placeholder="popup_input_biz_email" required />
      <input name="phone" type="tel" placeholder="Phone / WhatsApp" data-i18n-placeholder="popup_input_phone_wa" />
      <input name="country" type="text" placeholder="Country / Region" data-i18n-placeholder="popup_input_country" />
      <textarea name="message" placeholder="Describe your requirements…" data-i18n-placeholder="popup_input_requirements" rows="3"></textarea>
      
      <!-- Privacy note -->
      <p style="font-size: 0.75rem; color: #94a3b8; margin: 0;" data-i18n="popup_privacy_note">
        By submitting, you agree to our privacy policy. We protect your data.
      </p>
      
      <!-- Submit button -->
      <button type="submit" class="smart-popup-submit" data-i18n="popup_submit_button">Get My Quote</button>
    </form>
  </div>
</div>

<script>
// Bind event listeners immediately — template is loaded dynamically after DOMContentLoaded
(function() {
  function bindPopupEvents() {
    var overlay = document.getElementById('smart-popup-overlay');
    var closeBtn = document.getElementById('smart-popup-close');
    var form = document.getElementById('smart-popup-form');

    if (closeBtn && !closeBtn._bound) {
      closeBtn._bound = true;
      closeBtn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        if (window.smartPopup) {
          window.smartPopup.closePopup({ dismissed: true });
        } else if (window.closeSmartPopup) {
          window.closeSmartPopup();
        }
      });
    }

    if (form && !form._bound) {
      form._bound = true;
      form.addEventListener('submit', function(e) {
        if (window.submitSmartPopupForm) {
          window.submitSmartPopupForm(e);
        }
      });
    }

    if (overlay && !overlay._bound) {
      overlay._bound = true;
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay && window.smartPopup) {
          window.smartPopup.closePopup();
        }
      });
    }
  }

  // Run immediately since this script executes after the HTML is injected
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bindPopupEvents);
  } else {
    bindPopupEvents();
  }
})();
</script>
