<!-- Floating Buttons Styles -->
<style>
/* 入场动画 */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.animate-fade-in {
  animation: fadeInUp 0.5s ease-out forwards;
}

/* 按钮入场延迟 */
.whatsapp-btn {
  animation-delay: 0.1s;
}

.line-btn {
  animation-delay: 0.2s;
}

</style>

<!-- 浮动按钮交互脚本 -->
<script>
(function() {
  // WhatsApp和LINE按钮点击统计
  const socialButtons = document.querySelectorAll('.whatsapp-btn, .line-btn');
  socialButtons.forEach(btn => {
    btn.addEventListener('click', function(e) {
      const platform = this.classList.contains('whatsapp-btn') ? 'WhatsApp' : 'LINE';

      // 可以在这里添加统计代码
    });
  });

  // 按钮触摸反馈（移动端）
  const allButtons = document.querySelectorAll('.whatsapp-btn, .line-btn');
  allButtons.forEach(btn => {
    btn.addEventListener('touchstart', function() {
      this.style.transform = 'scale(0.95)';
    });
    btn.addEventListener('touchend', function() {
      this.style.transform = '';
    });
  });
})();
</script>

<!-- 浮动按钮交互脚本 -->
<script>
(function() {
  // WhatsApp和LINE按钮点击统计
  const socialButtons = document.querySelectorAll('.whatsapp-btn, .line-btn');
  socialButtons.forEach(btn => {
    btn.addEventListener('click', function(e) {
      const platform = this.classList.contains('whatsapp-btn') ? 'WhatsApp' : 'LINE';

      // 可以在这里添加统计代码
    });
  });

  // 回到顶部按钮逻辑
  const backToTopBtn = document.getElementById('back-to-top');
  if (backToTopBtn) {
    window.addEventListener('scroll', function() {
      const visible = window.scrollY > 300;
      if (visible) {
        backToTopBtn.classList.remove('opacity-0', 'scale-0');
        backToTopBtn.classList.add('opacity-100', 'scale-100');
        backToTopBtn.style.pointerEvents = 'auto';
      } else {
        backToTopBtn.classList.remove('opacity-100', 'scale-100');
        backToTopBtn.classList.add('opacity-0', 'scale-0');
        backToTopBtn.style.pointerEvents = 'none';
      }
    });

    backToTopBtn.addEventListener('click', function() {
      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });
    });
  }

  // 按钮触摸反馈（移动端）
  const allButtons = document.querySelectorAll('.whatsapp-btn, .line-btn, .back-to-top-btn');
  allButtons.forEach(btn => {
    btn.addEventListener('touchstart', function() {
      this.style.transform = 'scale(0.95)';
    });
    btn.addEventListener('touchend', function() {
      this.style.transform = '';
    });
  });
})();
</script>
