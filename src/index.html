      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {

        });

        caches.keys().then(function (names) {
          names.forEach(function (n) { caches.delete(n); });
        });
      }
    </script>

    <!-- Product data: empty by default, populate per project -->
    <script>"use strict"; var PRODUCT_DATA_TABLE = [];</script>
    <script defer src="/assets/js/search-index.js?v=202605291142"></script>
    <script>
      (function () {
        var KEY = "pdt_v2";
        var VERSION_KEY = "pdt_version";
        var initial = window.PRODUCT_DATA_TABLE || [];
        var version = window.PRODUCT_VERSION || "0";
        var cached = null;
        var storedVersion = localStorage.getItem(VERSION_KEY) || "";
        if (storedVersion === version) {
          try { cached = JSON.parse(localStorage.getItem(KEY)); } catch (e) {}
        } else {
          try { localStorage.removeItem(KEY); localStorage.removeItem(KEY + "_etag"); } catch (e) {}
        }
        window.PRODUCT_DATA_TABLE = cached || initial;
        window.dispatchEvent(new Event("product-data-ready"));
      })();
    </script>

    <!-- SPA Router Init -->
    <script>
      (function () {
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", initSPA);
        } else {
          initSPA();
        }

        function initSPA() {
          var path = window.location.pathname;
          if (path === "/" || path === "/index.html") {
            history.replaceState(null, "", "/home/");
          }

          var redirectParam = new URLSearchParams(window.location.search).get("redirect");
          if (redirectParam) {
            history.replaceState(null, "", redirectParam);
          }
        }
      })();
    </script>
