<!-- Product data: static initial data → API refresh with ETag → localStorage cache -->
<script>
(function() {
  var KEY = 'pdt_v2';
  var VERSION_KEY = 'pdt_version';
  // Step 1: initial data from static file (always fresh after publish)
  var initial = window.PRODUCT_DATA_TABLE || [];
  var version = window.PRODUCT_DATA_VERSION || '0';
  // Step 2: check localStorage cache — invalidate if version changed
  var cached = null;
  var storedVersion = localStorage.getItem(VERSION_KEY) || '';
  if (storedVersion === version) {
    try { cached = JSON.parse(localStorage.getItem(KEY)); } catch(e) {}
  } else {
    // Version mismatch — clear stale cache
    try { localStorage.removeItem(KEY); localStorage.removeItem(KEY + '_etag'); } catch(e) {}
  }
  // Use cached > initial (only if version matches)
  window.PRODUCT_DATA_TABLE = cached || initial;
  // Step 3: fetch latest from API (skip cache to always get fresh data after publish)
  // No backend API — use static data only
  window.dispatchEvent(new Event('product-data-ready'));
})();
</script>

<!-- Scripts -->
<script>
  (function() {
    // Wait for DOM to be ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initSPA);
    } else {
      initSPA();
    }

    function initSPA() {
      // Navigator and Footer are auto-mounted by their own boot() code.
      // Do NOT call mount() again — the placeholder has already been replaced
      // and a second mount would find no placeholder to render.

      // Root path redirect: / → /home/
      var path = window.location.pathname;
      if (path === '/' || path === '/index.html') {
        history.replaceState(null, '', '/home/');
      }

      // GitHub Pages 404 SPA redirect:
      // 404.html redirects unknown paths to /?redirect=/original/path/
      // We restore the path before the SPA router initializes so it
      // navigates to the correct route instead of home.
      var redirectParam = new URLSearchParams(window.location.search).get('redirect');
      if (redirectParam) {
        // Clean the URL back to the original path before router init
        history.replaceState(null, '', redirectParam);
      }


    }
  })();
</script>
