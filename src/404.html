    <script src="/site.config.js" defer></script>
    <!-- SPA Fallback: redirect known virtual routes to physical pages -->
    <script>
      (function () {
        var p = window.location.pathname,
          n = p.replace(/\/$/, ""),
          s = n.replace(/^\//, "");
        var cats = ["all", "coffee", "tea", "meal", "beauty", "weight", "gut", "lifestyle", "legacy"];

        // ── Virtual routes: PDP ───────────────────────────
        if (/^\/products\/([a-zA-Z0-9_-]+)\/[a-zA-Z0-9_..-]+$/.test(n)) {
          var cat = n.replace(/^\/products\/([a-zA-Z0-9_-]+)\/[a-zA-Z0-9_..-]+$/, "$1");
          if (cats.indexOf(cat) !== -1) window.location.replace("/products/" + cat + "/");
          else window.location.replace("/products/");
          return;
        }
        // Old-format PDP: /products/<model>/ (not a known category)
        if (/^\/products\/[^/]+$/.test(n) &&
            cats.indexOf(n.replace(/^\/products\//, "")) === -1 &&
            ["detail","compare"].indexOf(n.replace(/^\/products\//, "")) === -1) {
          window.location.replace("/products/");
          return;
        }
        // ── Virtual routes: case detail ────────────────────
        if (/^\/cases\/[a-z0-9-]+$/.test(n) && n !== "/cases/index") {
          window.location.replace("/cases/");
          return;
        }
        // ── Virtual routes: news detail ────────────────────
        if (n === "/news/detail") {
          window.location.replace("/news/detail/");
          return;
        }

        // ── Known routes: add trailing slash ───────────────
        if (/^\/products\//.test(p)) {
          var c = p.replace(/^\/products\//, "").replace(/\/$/, "");
          if (cats.indexOf(c) !== -1) window.location.replace("/products/" + c + "/");
          return;
        }
        // Old route aliases: /coffee/ → /products/coffee/
        if (cats.indexOf(s) !== -1) {
          window.location.replace("/products/" + s + "/");
          return;
        }
        // Sub-routes: /solutions/oem/ → add trailing slash
        var subRoutes = ["solutions/oem","solutions/odm","solutions/obm","solutions/rd","solutions/packaging",
                          "resources/catalog","resources/videos","resources/whitepapers"];
        for (var i = 0; i < subRoutes.length; i++) {
          if (n === "/" + subRoutes[i]) {
            window.location.replace("/" + subRoutes[i] + "/");
            return;
          }
        }
        // /products/ → add trailing slash
        if (n === "/products") {
          window.location.replace("/products/");
          return;
        }
        var routes = [
            "home",
            "solutions",
            "about",
            "contact",
            "cases",
            "support",
            "manufacturing",
            "compliance",
            "resources",
            "news",
            "profit-calculator",
            "quote",
            "thank-you",
          ];
          if (routes.indexOf(s) !== -1) window.location.replace("/" + s + "/");
          var seg = n.split("/").pop();
          if (routes.indexOf(seg) !== -1) window.location.replace("/" + seg + "/");
        }
      })();
    </script>
