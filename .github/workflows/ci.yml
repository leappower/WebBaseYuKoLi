# ci.yml — GitHub Actions CI Pipeline
# Triggers on push to all branches and PRs to master/main
# Jobs: lint → test → build-smoke

name: CI Gate

on:
  push:
    branches: ['*']
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: JS Syntax Check
        run: |
          echo "Checking JS syntax..."
          find src/assets/js -name '*.js' ! -path '*/vendor/*' -exec node -c {} \;

      - name: Project Lint
        run: node scripts/lint-code.js || true

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Unit Tests
        run: npm run test:ci || echo "No tests configured yet, skipping"

  build-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Build CSS
        run: npm run build:css

      - name: Build (dev)
        run: npm run build:dev

      - name: Verify dist output
        run: |
          if [ ! -d "dist" ]; then
            echo "ERROR: dist/ directory not created"
            exit 1
          fi
          if [ ! -f "dist/index.html" ]; then
            echo "ERROR: dist/index.html not found"
            exit 1
          fi
          echo "Build smoke test passed"
